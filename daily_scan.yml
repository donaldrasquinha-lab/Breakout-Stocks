name: Daily Upstox Data Pull

on:
  schedule:
    # Runs at 11:00 AM UTC (4:30 PM IST) every weekday
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run scanner script
        env:
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
        run: breakoutdashapp.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add upstox_stock_data.csv
          git commit -m "Auto-update stock data: $(date +'%Y-%m-%d')" || exit 0
          git push
